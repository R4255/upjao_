version: "3.8"

services:
  # Init container to download and export the YOLOv8 model for Triton
  model-exporter:
    image: python:3.10-slim
    container_name: yolo_model_exporter
    volumes:
      - ./model_repository:/model_repository
      - ./scripts:/scripts
    # Install dependencies required for YOLOv8 and ONNX exporting
    command: >
      bash -c "apt-get update && apt-get install -y libgl1 libglib2.0-0 libsm6 libxext6 libxrender-dev && pip install --no-cache-dir torch==2.5.1 torchvision==0.20.1 ultralytics==8.2.2 onnx onnxsim onnxruntime && python /scripts/export_yolo.py"

  # NVIDIA Triton Inference Server
  tritonserver:
    image: nvcr.io/nvidia/tritonserver:23.10-py3
    container_name: triton_server
    depends_on:
      model-exporter:
        condition: service_completed_successfully
    ports:
      - "8000:8000" # Triton HTTP
      - "8001:8001" # Triton gRPC
      - "8002:8002" # Triton Metrics
    volumes:
      - ./model_repository:/models
    command: >
      tritonserver --model-repository=/models --log-verbose=1 

  # FastAPI Application
  fastapi:
    build:
      context: ./app
    container_name: fastapi_server
    depends_on:
      - tritonserver
    ports:
      - "8080:8000" # Expose FastAPI App on Port 8080
    environment:
      - TRITON_SERVER_URL=tritonserver:8001
    restart: unless-stopped
